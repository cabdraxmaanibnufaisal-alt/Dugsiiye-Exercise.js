<!DOCTYPE html>
<html lang="en">
<head>

    <title>Exercise 27</title>
</head>
<body>
    <script>
        function FetchData(){
          return new Promise((resolve , reject)=>{
           
                setTimeout(()=>{
                    const success = false;
                    if(success){
                        resolve({id:19, name:'cabdiraxmaan',})
                    }else{
                        reject("this fetch is failed")
                    }
                },3000)
            })
        }
        FetchData()
        .then((data)=>console.log(data))
        .catch((err)=>{console.log(err)})
    </script>

</body>
</html>
