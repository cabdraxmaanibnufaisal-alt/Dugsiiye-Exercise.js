          return new Promise((resolve , reject)=>{
             
                setTimeout(()=>{

                    }else{
                        reject("this fetch is failed")
                    }
                },1000)
            })
        }
      async function fetchdataOne() {
        try{
            const user = await FetchData()
            console.log(user)
        }catch(err){;
            console.log(err)
        
      }
      }
      fetchdataOne()
